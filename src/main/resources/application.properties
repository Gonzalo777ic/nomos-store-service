# ==========================================
# SPRING BOOT APPLICATION
# ==========================================
spring.application.name=nomos-store-service

# Puerto para el Store Service (asumiendo que Auth=8080, Inventory=8082)
server.port=8083

# ==========================================
# BASE DE DATOS POSTGRESQL (nomos_sales_db)
# ==========================================
# Base de datos ˙nica para el dominio de Ventas.
spring.datasource.url=jdbc:postgresql:
spring.datasource.username=gonzalo
spring.datasource.password=2577705
spring.datasource.driver-class-name=org.postgresql.Driver

# ConfiguraciÛn de Hibernate para la gestiÛn de la base de datos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# SEGURIDAD (Resource Server - Auth0 JWT)
# ==========================================
# ConfiguraciÛn esencial para que Spring sepa dÛnde verificar el JWT.

# URL del emisor (Issuer URI). Misma que usas en Auth/Inventory.
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dev-663twfpev8syoqq5.us.auth0.com/

# La Audience (Audience, 'aud' claim). Debe ser la audiencia de este servicio.
spring.security.oauth2.resourceserver.jwt.audience=https://nomos.store.api

# Nivel de debug para ver el proceso de autenticaciÛn del JWT .
logging.level.org.springframework.security=DEBUG